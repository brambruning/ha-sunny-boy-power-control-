<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#0073BD"/>

  <!-- Sun rays -->
  <g stroke="#FFB900" stroke-width="7" stroke-linecap="round">
    <line x1="128" y1="46" x2="128" y2="34"/>
    <line x1="159" y1="55" x2="167" y2="46"/>
    <line x1="178" y1="82" x2="189" y2="78"/>
    <line x1="178" y1="112" x2="189" y2="118"/>
    <line x1="97"  y1="55" x2="89"  y2="46"/>
    <line x1="78"  y1="82" x2="67"  y2="78"/>
    <line x1="78"  y1="112" x2="67" y2="118"/>
  </g>

  <!-- Sun -->
  <circle cx="128" cy="90" r="32" fill="#FFB900"/>

  <!-- Solar panel grid lines on sun -->
  <g stroke="#E69500" stroke-width="2" opacity="0.6">
    <line x1="128" y1="58" x2="128" y2="122"/>
    <line x1="104" y1="75" x2="152" y2="75"/>
    <line x1="100" y1="90" x2="156" y2="90"/>
    <line x1="104" y1="105" x2="152" y2="105"/>
  </g>

  <!-- Slider track background -->
  <rect x="44" y="158" width="168" height="12" rx="6" fill="white" opacity="0.25"/>

  <!-- Slider track filled (≈60%) -->
  <rect x="44" y="158" width="100" height="12" rx="6" fill="white" opacity="0.85"/>

  <!-- Slider thumb -->
  <circle cx="144" cy="164" r="18" fill="white" filter="url(#shadow)"/>
  <circle cx="144" cy="164" r="11" fill="#0073BD"/>

  <!-- "SMA" text -->
  <text x="128" y="218" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="4">SMA</text>

  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
</svg>
